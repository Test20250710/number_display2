<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新叫號 - 茂達電子捐血活動</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        :root {
            --primary-color: #005a9e;
            --accent-color: #e02424;
            --success-color: #38a169;
            --text-color: #2d3748;
            --background-gradient: linear-gradient(135deg, #e6f0fa 0%, #f7fafc 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100%;
            background: var(--background-gradient);
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        .main-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 20px;
        }

        /* 目前系統顯示號碼：跟輸入框同樣份量，讓現場人員一眼看到現在到哪號 */
        #current-number-block {
            text-align: center;
            background: rgba(229, 243, 255, 0.5);
            border: 2px solid rgba(0, 90, 158, 0.15);
            border-radius: 12px;
            padding: 12px 10px;
            margin-bottom: 20px;
        }

        #current-number-block .label {
            font-size: 0.9rem;
            color: var(--text-color);
            margin-bottom: 4px;
        }

        #current-number {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-color);
            line-height: 1.1;
        }

        #current-number.small-text { font-size: 1.6rem; color: #4a5568; }

        .section-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            font-size: 3rem;
            text-align: center;
            padding: 16px;
            border: 3px solid #cbd5e0;
            border-radius: 12px;
            margin-bottom: 12px;
            font-weight: 700;
            color: var(--text-color);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button.submit-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button.submit-btn:active { background: #004070; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #a0aec0;
            font-size: 0.85rem;
            margin: 22px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span { padding: 0 12px; }

        .quick-section {
            background: #f7fafc;
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
        }

        .quick-section .quick-note {
            font-size: 0.8rem;
            color: #718096;
            text-align: center;
            margin-bottom: 10px;
        }

        .quick-buttons {
            display: flex;
            gap: 10px;
        }

        .quick-buttons button {
            flex: 1;
            padding: 14px;
            font-size: 1.4rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            background: #edf2f7;
            color: var(--primary-color);
            cursor: pointer;
        }

        .quick-buttons button:active { background: #cbd5e0; }

        .other-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button.reset-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            color: #718096;
            background: white;
            border: 2px solid #cbd5e0;
            border-radius: 12px;
            cursor: pointer;
        }

        button.finish-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--accent-color);
            background: white;
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            cursor: pointer;
        }

        #status-message {
            text-align: center;
            margin-top: 16px;
            font-size: 1rem;
            font-weight: 500;
            min-height: 24px;
        }

        #status-message.success { color: var(--success-color); }
        #status-message.error { color: var(--accent-color); }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>🩸 捐血活動叫號更新</h1>
        <p class="subtitle">輸入目前號碼後按「更新號碼」即可</p>

        <div id="current-number-block">
            <div class="label">目前系統顯示號碼</div>
            <div id="current-number">讀取中...</div>
        </div>

        <div class="section-label">輸入新的號碼（0-300 的整數）</div>
        <input type="text" id="number-input" inputmode="numeric" placeholder="輸入號碼" autocomplete="off" maxlength="3">
        <button class="submit-btn" onclick="updateNumber()">更新號碼</button>

        <div class="divider"><span>或</span></div>

        <div class="quick-section">
            <div class="quick-note">快速微調：直接以「目前系統顯示號碼」±1，<br>不會用到上面輸入框的內容</div>
            <div class="quick-buttons">
                <button type="button" onclick="adjust(-1)">－1</button>
                <button type="button" onclick="adjust(1)">＋1</button>
            </div>
        </div>

        <div class="other-actions">
            <button class="reset-btn" onclick="resetToInitial()">🔄 重置為初始狀態（活動尚未開始）</button>
            <button class="finish-btn" onclick="markFinished()">🏁 活動結束（顯示「圓滿結束」）</button>
        </div>

        <div id="status-message"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAc9v6OEqCb1FCBPhWjOrX33-IHe0pinCs",
            authDomain: "blood-drive-2026.firebaseapp.com",
            databaseURL: "https://blood-drive-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "blood-drive-2026",
            storageBucket: "blood-drive-2026.firebasestorage.app",
            messagingSenderId: "45615522901",
            appId: "1:45615522901:web:feef459762ba83331b20dc",
            measurementId: "G-EY6V9HJ8MG"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const numberRef = db.ref('bloodDrive/currentNumber');
        const timeRef = db.ref('bloodDrive/lastUpdated');

        const numberInput = document.getElementById('number-input');
        const currentNumberEl = document.getElementById('current-number');
        const statusMessage = document.getElementById('status-message');

        const MIN_NUMBER = 0;
        const MAX_NUMBER = 300; // 活動預估總人數上限，需要調整時改這裡就好

        // 驗證輸入是否為 0-300 之間的整數（不接受小數點、負號、文字）
        // 回傳 null 代表驗證失敗
        function validateAndParseNumber(rawValue) {
            if (!/^\d+$/.test(rawValue)) return null; // 只能是純數字（無小數點、無負號）
            const n = parseInt(rawValue, 10);
            if (n < MIN_NUMBER || n > MAX_NUMBER) return null;
            return n;
        }

        // 顯示目前號碼，方便福委知道現在到哪個號碼再決定要 +1 還是直接輸入
        numberRef.on('value', (snapshot) => {
            const val = snapshot.val();
            if (val === null || val === undefined || val === "") {
                currentNumberEl.textContent = "活動尚未開始";
                currentNumberEl.classList.add('small-text');
            } else {
                currentNumberEl.textContent = val;
                currentNumberEl.classList.toggle('small-text', isNaN(val));
            }
        });

        function showStatus(message, isError) {
            statusMessage.textContent = message;
            statusMessage.className = isError ? 'error' : 'success';
            setTimeout(() => { statusMessage.textContent = ''; }, 3000);
        }

        function writeNumber(value, successMessage) {
            const now = new Date().toLocaleString('zh-TW', { hour12: false });
            numberRef.set(value)
                .then(() => {
                    timeRef.set(now);
                    showStatus(successMessage || ('✅ 已更新為：' + value), false);
                    numberInput.value = '';
                })
                .catch((err) => {
                    showStatus('❌ 更新失敗，請檢查網路：' + err.message, true);
                });
        }

        function updateNumber() {
            const value = numberInput.value.trim();
            if (value === '') {
                showStatus('請先輸入號碼', true);
                return;
            }
            const n = validateAndParseNumber(value);
            if (n === null) {
                showStatus(`請輸入 0-${MAX_NUMBER} 之間的整數（不可有小數點或負號）`, true);
                return;
            }
            writeNumber(n);
        }

        function adjust(delta) {
            // 快速微調一律以資料庫目前的號碼為準，並清空輸入框，避免跟手動輸入的內容混淆
            numberInput.value = '';
            numberRef.get().then((snapshot) => {
                let current = parseInt(snapshot.val(), 10);
                if (isNaN(current)) current = 0;

                let next = current + delta;
                if (next < MIN_NUMBER) next = MIN_NUMBER;
                if (next > MAX_NUMBER) next = MAX_NUMBER;

                if (next === current) {
                    showStatus(
                        next === MIN_NUMBER ? '已經是最小值 0，無法再減少' : `已經是上限 ${MAX_NUMBER}，無法再增加`,
                        true
                    );
                    return;
                }

                writeNumber(next);
            });
        }

        function markFinished() {
            if (confirm('確定要標示活動「圓滿結束」嗎？')) {
                writeNumber('圓滿結束');
            }
        }

        function resetToInitial() {
            if (confirm('確定要重置為初始狀態（活動尚未開始）嗎？')) {
                writeNumber('', '✅ 已重置為初始狀態');
            }
        }

        // 讓輸入框可以直接按 Enter 送出
        numberInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') updateNumber();
        });

        // 即時過濾：輸入當下就把非數字字元（小數點、負號、文字等）濾掉，
        // 避免使用者打到一半才發現不能送出
        numberInput.addEventListener('input', () => {
            numberInput.value = numberInput.value.replace(/[^\d]/g, '');
        });
    </script>
</body>
</html>
