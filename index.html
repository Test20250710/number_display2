<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茂達電子-捐血活動即時叫號</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        :root {
            --primary-color: #005a9e;
            --accent-color: #e02424;
            --text-color: #2d3748;
            --background-gradient: linear-gradient(135deg, #e6f0fa 0%, #f7fafc 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--background-gradient);
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        .main-container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 30px;
            margin: 20px;
            transition: transform 0.3s ease;
        }

        .main-container:hover { transform: translateY(-5px); }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 90, 158, 0.1);
        }

        header svg { width: 48px; height: 48px; color: var(--primary-color); transition: transform 0.3s ease; }
        header:hover svg { transform: scale(1.1); }

        header h1 { font-size: 2rem; font-weight: 700; color: var(--primary-color); line-height: 1.2; }

        .status-panel {
            text-align: center;
            padding: 20px 0;
            background: rgba(229, 243, 255, 0.3);
            border-radius: 12px;
            margin: 20px 0;
        }

        .status-panel h2 { font-size: 1.3rem; font-weight: 500; color: var(--text-color); margin-bottom: 15px; }

        #number-display {
            font-size: 6.5rem;
            font-weight: 700;
            color: var(--accent-color);
            line-height: 1;
            transition: all 0.3s ease;
        }

        #number-display.small-text { font-size: 2.2rem; color: #4a5568; }

        #connection-status {
            font-size: 0.85rem;
            color: #a0aec0;
            margin-top: 6px;
        }

        #connection-status.live { color: #38a169; }
        #connection-status.offline { color: var(--accent-color); }

        .info-panel {
            background: rgba(219, 217, 217, 0.233);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .info-panel p {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: var(--text-color);
            margin: 10px 0;
        }

        .info-panel .icon { font-size: 1.2rem; }
        .info-panel strong { font-weight: 600; color: var(--primary-color); }

        footer { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #718096; }
        footer span { font-weight: 500; color: var(--text-color); }

        @media (max-width: 480px) {
            .main-container { padding: 20px; margin: 15px; }
            header h1 { font-size: 1.6rem; }
            #number-display { font-size: 5rem; }
            #number-display.small-text { font-size: 1.8rem; }
            .info-panel p { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 6a.75.75 0 00-1.5 0v6c0 .414.336.75.75.75h4.5a.75.75 0 000-1.5h-3.75V6z" clip-rule="evenodd" />
            </svg>
            <h1>茂達電子<br>捐血活動</h1>
        </header>

        <div class="status-panel">
            <h2>目前叫號</h2>
            <div id="number-display">讀取中...</div>
            <div id="connection-status">連線中...</div>
        </div>

        <div class="info-panel">
            <p><span class="icon">📅</span> <strong>日期：</strong> 115 / 07 / 30</p>
            <p><span class="icon">⏰</span> <strong>時間：</strong> 10:00 - 16:00</p>
            <p><span class="icon">📍</span> <strong>地點：</strong> 公司一樓大廳外</p>
            <p><span class="icon">🦔</span> <strong>主辦：</strong> 茂達電子 福委會</p>
        </div>

        <footer>
            <p>最後更新時間：<span id="last-updated">尚未更新</span></p>
        </footer>
    </div>

    <script>
        // ==============================================================
        // 輪詢版：改用 REST API 定時抓取，取代原本的持續監聽（onValue）。
        // 好處：每次都是「問一次、拿到資料、斷開」，不會長時間佔用
        // Firebase Realtime Database 的「同時連線數」名額，300人同時開著
        // 也不會撞到 Spark 免費方案 100 個同時連線的上限。
        // 代價：不是真正的「即時推送」，號碼變動後最多等 POLL_INTERVAL_MS
        // 這麼久才會反映到畫面上（目前設定 5 秒）。
        // ==============================================================

        // 請確認這裡的網址跟你 Firebase 專案的 databaseURL 一致
        const DATABASE_URL = "https://blood-drive-2026-default-rtdb.asia-southeast1.firebasedatabase.app";
        const DATA_PATH = "bloodDrive.json"; // 一次抓 currentNumber + lastUpdated，省流量
        const POLL_INTERVAL_MS = 5000; // 輪詢間隔：5 秒。可依需求調整，建議不要低於 3 秒

        const numberDisplay = document.getElementById('number-display');
        const lastUpdated = document.getElementById('last-updated');
        const connectionStatus = document.getElementById('connection-status');

        let lastKnownNumber = undefined;

        function updateNumberDisplay(number) {
            if (number === null || number === undefined || number === "") {
                numberDisplay.textContent = '活動尚未開始';
                numberDisplay.classList.add('small-text');
                return;
            }
            if (!isNaN(number) && number !== "") {
                // 是數字
                numberDisplay.textContent = number;
                numberDisplay.classList.remove('small-text');
            } else {
                // 是文字，例如「圓滿結束」
                numberDisplay.textContent = number;
                numberDisplay.classList.add('small-text');
            }
        }

        function fetchLatestData() {
            const url = `${DATABASE_URL}/${DATA_PATH}?_=${Date.now()}`; // 加時間戳避免瀏覽器快取

            fetch(url, { cache: 'no-store' })
                .then(response => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(data => {
                    const newNumber = data ? data.currentNumber : null;
                    const newTime = data ? data.lastUpdated : null;

                    if (newNumber !== lastKnownNumber) {
                        updateNumberDisplay(newNumber);
                        lastKnownNumber = newNumber;
                    } else if (lastKnownNumber === undefined) {
                        // 第一次讀取，即使沒有變化也要顯示
                        updateNumberDisplay(newNumber);
                        lastKnownNumber = newNumber;
                    }

                    lastUpdated.textContent = newTime || '尚未更新';

                    connectionStatus.textContent = '● 資料同步中（每 ' + (POLL_INTERVAL_MS / 1000) + ' 秒更新一次）';
                    connectionStatus.className = 'live';
                })
                .catch(error => {
                    console.error('讀取號碼失敗:', error);
                    connectionStatus.textContent = '● 網路連線異常，正在重試...';
                    connectionStatus.className = 'offline';
                });
        }

        fetchLatestData();
        setInterval(fetchLatestData, POLL_INTERVAL_MS);
    </script>
</body>
</html>
